notes: |
  AT&T Nokia BGW320-505 XGS-PON fiber gateway (ONT + router) — NOT a DOCSIS
  cable modem, so it has no downstream/upstream channels and no DOCSIS version.
  The read-only status pages require no authentication.

  Fiber "signal quality" is a single optical link. parser.py extracts the
  current optical values embedded in the <h1> "Currently N" headers on
  fiberstat.ha: Rx/Tx power (firmware reports one-tenth dBm, scaled to dBm)
  and module temperature (°C). WAN throughput/error counters come from the
  broadbandstatistics.ha IPv4 Statistics table; link state/wavelength from
  fiberstat.ha.

  The gateway's software base is ARRIS/Nokia with the classic /cgi-bin/*.ha
  XHTML UI. Login-protected actions (e.g. restart) use a server-nonce + MD5
  scheme (hashpassword = md5(access_code + nonce)).

